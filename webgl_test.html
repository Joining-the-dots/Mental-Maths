<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebGL test — Conway Learning Lab</title>
<style>
  html, body { margin: 0; padding: 0; background: #20143a; font-family: system-ui, sans-serif; }
  #status {
    position: fixed; top: 0; left: 0; right: 0;
    background: #2b2140; color: #fff; padding: 10px 14px;
    font-size: 14px; z-index: 10; line-height: 1.5;
  }
  #status b { color: #ffd479; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="status">Starting…</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const status = document.getElementById('status');
function log(msg) { status.innerHTML += '<br>' + msg; }

try {
  if (typeof THREE === 'undefined') {
    status.innerHTML = '❌ <b>Three.js did NOT load.</b> The CDN script was blocked. This is why the 3D palace is blank.';
    throw new Error('no THREE');
  }
  status.innerHTML = '✅ <b>Three.js loaded</b> (r' + THREE.REVISION + '). Building a test scene…';

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xbfe0f5);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(7, 6, 9);
  camera.lookAt(0, 0.6, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xfff2d6, 0.9);
  sun.position.set(6, 12, 5);
  sun.castShadow = true;
  scene.add(sun);

  // Grass
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ color: 0x9ec07a })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // A little room: wood floor + 2 walls
  const floor = new THREE.Mesh(
    new THREE.BoxGeometry(5, 0.1, 4),
    new THREE.MeshStandardMaterial({ color: 0xc8a878 })
  );
  floor.position.set(0, 0.05, 0);
  floor.receiveShadow = true;
  scene.add(floor);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xf3eee5 });
  const w1 = new THREE.Mesh(new THREE.BoxGeometry(5, 2.5, 0.1), wallMat);
  w1.position.set(0, 1.25, -2);
  w1.castShadow = true; scene.add(w1);
  const w2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.5, 4), wallMat);
  w2.position.set(-2.5, 1.25, 0);
  w2.castShadow = true; scene.add(w2);

  // A sofa (base + cushions + back + arms)
  const sofa = new THREE.Group();
  const fab = new THREE.MeshStandardMaterial({ color: 0xd76a4a });
  const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.9), fab);
  base.position.y = 0.4; base.castShadow = true; sofa.add(base);
  for (let i = -1; i <= 1; i++) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.22, 0.78),
      new THREE.MeshStandardMaterial({ color: 0xe88a6e }));
    c.position.set(i * 0.65, 0.7, 0.05); c.castShadow = true; sofa.add(c);
  }
  const back = new THREE.Mesh(new THREE.BoxGeometry(2, 0.55, 0.18), fab);
  back.position.set(0, 0.9, -0.36); back.castShadow = true; sofa.add(back);
  for (const sx of [-1, 1]) {
    const a = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.5, 0.9), fab);
    a.position.set(sx, 0.65, 0); a.castShadow = true; sofa.add(a);
  }
  sofa.position.set(0, 0, 0.3);
  scene.add(sofa);

  // A potted plant
  const plant = new THREE.Group();
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 0.3, 16),
    new THREE.MeshStandardMaterial({ color: 0x8d5a3a }));
  pot.position.y = 0.15; plant.add(pot);
  for (let i = 0; i < 4; i++) {
    const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 8),
      new THREE.MeshStandardMaterial({ color: 0x3a8b5c }));
    leaf.position.set((Math.random() - 0.5) * 0.2, 0.45 + Math.random() * 0.2, (Math.random() - 0.5) * 0.2);
    plant.add(leaf);
  }
  plant.position.set(1.6, 0, -1.4);
  scene.add(plant);

  status.innerHTML = '✅ <b>WebGL is working!</b> You should see a 3D room with an orange sofa and a plant below. Drag to spin it.';

  // Simple spin-on-drag
  let dragging = false, lastX = 0, angle = 0;
  renderer.domElement.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; });
  window.addEventListener('pointerup', () => dragging = false);
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    angle += (e.clientX - lastX) * 0.01;
    lastX = e.clientX;
  });

  function animate() {
    requestAnimationFrame(animate);
    const r = 11;
    camera.position.x = Math.sin(angle) * r;
    camera.position.z = Math.cos(angle) * r;
    camera.position.y = 6;
    camera.lookAt(0, 0.6, 0);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
} catch (e) {
  log('❌ Error: ' + e.message);
}
</script>
</body>
</html>
